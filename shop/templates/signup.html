{% extends 'base.html' %}
{% block title %} Sign Up {% endblock title %}
{% block body %}

<div class="container">
    <div class="p-4 m-5">
        <div class="col-lg-6 mx-auto border rounded pt-2  mt-4 mb-4 ">
            <h1 align="center" class="container-teal pt-5">Create Account</h1>

            <form action="" method="post" class="p-5">

                {% csrf_token %}
                {% if error %}
                <div class="alert alert-danger" role="alert">
                    {{error}}
                </div>
                {% endif %}
                <div class="formroup">
                    <label for="">First Name</label>
                    <input aria-describedby="helpId" class="form-control" id="" name="firstname" type="text"
                           value="{{values.first_name}}">
                </div>

                <div class="form-group">
                    <label for="">Last Name</label>
                    <input aria-describedby="helpId" class="form-control" id="" name="lastname" type="text"
                           value="{{values.last_name}}">
                </div>

                <div class="form-group">
                    <label for="">Phone</label>
                    <input aria-describedby="helpId" class="form-control" id="" name="phone" placeholder="0123456789"
                           type="text" value="{{values.phone}}">
                </div>


                <!--email-->
                <div class="form-group">
                    <label for="">Email</label>
                    <input aria-describedby="helpId" class="form-control" id="" name="email" placeholder="example@gmail.com" required
                           type="email" value="{{values.email}}">
                </div>

                <!--email-->
                <div class="form-group">
                    <label for="">Password</label>
                    <input aria-describedby="helpId" class="form-control" id="" name="password" placeholder="********"
                           type="password">
                </div>


                <!--                            &lt;!&ndash;email&ndash;&gt;-g-->


                <div class="form-group">
                    <input class="btn btn-sm  mt-4 mb-4 btn-info" type="submit" value="Create Account">

                </div>


            </form>
        </div>

    </div>


</div>


{%endblock body %}
